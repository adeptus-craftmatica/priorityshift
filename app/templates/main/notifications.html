{% extends "base.html" %}
{% block title %}Notifications · PriorityShift{% endblock %}
{% block content %}
<div class="mx-auto max-w-2xl">
  <div class="mb-4 flex items-center justify-between">
    <h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Notifications</h1>
    <form method="post" action="{{ url_for('main.mark_all_notifications_read') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <button type="submit" class="btn-ghost text-sm">Mark all read</button>
    </form>
  </div>
  <div class="card p-2">
    {% include "main/_notifications_list.html" %}
  </div>
</div>
{% endblock %}
