<header class="sticky top-0 z-20 flex h-16 items-center gap-3 border-b border-slate-200 bg-white/80 px-4 backdrop-blur dark:border-white/[0.06] dark:bg-surface-dark/80 sm:px-6 lg:px-8">
  <button @click="mobileNavOpen = true" class="rounded-lg p-2 text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-white/[0.06] lg:hidden">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd" /></svg>
  </button>

  <form action="{{ url_for('main.search') }}" method="get" class="min-w-0 flex-1 max-w-xl">
    <div class="relative">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="pointer-events-none absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-400"><path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd" /></svg>
      <input type="search" name="q" value="{{ request.args.get('q', '') }}" placeholder="Search projects, chores, ideas, people…"
             class="field-input pl-9" />
    </div>
  </form>

  <div class="flex items-center gap-1.5">
    <button @click="toggleTheme()" class="rounded-lg p-2 text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-white/[0.06]" title="Toggle theme">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" /></svg>
    </button>

    <div class="relative" x-data="{ open: false }">
      <button @click="open = !open" @click.outside="open = false" class="relative rounded-lg p-2 text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-white/[0.06]">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5"><path d="M10 2a6 6 0 00-6 6c0 1.887-.454 3.665-1.257 5.234a.75.75 0 00.515 1.076c1.13.23 2.284.398 3.457.502a3.5 3.5 0 006.57 0c1.173-.104 2.327-.272 3.457-.502a.75.75 0 00.515-1.076A11.448 11.448 0 0116 8a6 6 0 00-6-6zM8.05 14.943a33.54 33.54 0 003.9 0 2 2 0 01-3.9 0z" /></svg>
        {% if unread_notification_count > 0 %}
        <span class="absolute right-1 top-1 flex h-4 w-4 items-center justify-center rounded-full bg-rose-500 text-[10px] font-semibold text-white">{{ unread_notification_count if unread_notification_count < 10 else '9+' }}</span>
        {% endif %}
      </button>
      <div x-show="open" x-transition style="display: none;"
           class="absolute right-0 z-30 mt-2 w-80 max-h-96 overflow-y-auto card p-2">
        <div hx-get="{{ url_for('main.notifications') }}" hx-trigger="load" hx-swap="innerHTML"></div>
      </div>
    </div>

    <a href="{{ url_for('auth.account') }}" class="ml-1 flex items-center gap-2 rounded-lg border-l border-slate-200 py-1.5 pl-3 pr-2 hover:bg-slate-100 dark:border-white/[0.06] dark:hover:bg-white/[0.06]">
      {% from "macros/ui.html" import avatar %}
      {{ avatar(current_user, size=8) }}
      <div class="hidden text-left sm:block">
        <p class="text-sm font-medium leading-tight text-slate-800 dark:text-slate-100">{{ current_user.full_name }}</p>
        <p class="text-xs leading-tight text-slate-500 dark:text-slate-400">{{ current_user.role.name }}</p>
      </div>
    </a>
  </div>
</header>
