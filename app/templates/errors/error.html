{% extends "base.html" %}
{% block title %}{{ code }} · PriorityShift{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center py-24 text-center">
  <p class="text-5xl font-bold text-slate-300 dark:text-slate-700">{{ code }}</p>
  <p class="mt-3 text-base font-medium text-slate-700 dark:text-slate-200">{{ message }}</p>
  <a href="{{ url_for('main.index') }}" class="btn-primary mt-6">Back to dashboard</a>
</div>
{% endblock %}
{% block guest_content %}
<div class="flex min-h-screen flex-col items-center justify-center text-center">
  <p class="text-5xl font-bold text-slate-300">{{ code }}</p>
  <p class="mt-3 text-base font-medium text-slate-700">{{ message }}</p>
  <a href="{{ url_for('auth.login') }}" class="btn-primary mt-6">Sign in</a>
</div>
{% endblock %}
